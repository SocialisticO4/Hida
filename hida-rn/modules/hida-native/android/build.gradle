apply plugin: 'com.android.library'
apply plugin: 'org.jetbrains.kotlin.android'
apply plugin: 'org.jetbrains.kotlin.plugin.compose'

group = 'app.hida.vault.nativemodule'
version = '0.0.1'

android {
  namespace "app.hida.vault.nativemodule"
  compileSdkVersion safeExtGet("compileSdkVersion", 35)

  defaultConfig {
    minSdkVersion safeExtGet("minSdkVersion", 26)
    targetSdkVersion safeExtGet("targetSdkVersion", 35)
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }

  kotlinOptions {
    jvmTarget = "17"
  }

  buildFeatures {
    compose true
  }

}

dependencies {
  implementation project(':expo-modules-core')
  implementation("com.facebook.react:react-android")
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:${getKotlinVersion()}"
  implementation "androidx.security:security-crypto:1.1.0-alpha06"
  implementation "androidx.biometric:biometric:1.1.0"
  implementation "org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3"

  // Jetpack Compose
  def composeBom = platform("androidx.compose:compose-bom:2024.02.00")
  implementation composeBom
  implementation "androidx.compose.ui:ui"
  implementation "androidx.compose.foundation:foundation"
  implementation "androidx.compose.material3:material3"
  implementation "androidx.compose.material:material"
  implementation "androidx.compose.material:material-icons-extended"
  implementation "androidx.activity:activity-compose:1.9.0"
  implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.8.0"
  implementation "androidx.savedstate:savedstate-ktx:1.2.1"
}

def safeExtGet(prop, fallback) {
  rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

def getKotlinVersion() {
  def kotlin_version = rootProject.ext.has("kotlinVersion") ? rootProject.ext.get("kotlinVersion") : "1.9.24"
  return kotlin_version
}

